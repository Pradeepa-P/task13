<html>
    <head>

    </head>
    <body>
        <script>

            //for loop to print  1 to 10 

            for(let i=1;i<=10;i++){
                console.log("The first 10 numbers:",i);
            }
        
            // while loop to print 1 to 5

            let j=1;
            while(j<=5){
                console.log("The first 5  numbers:",j);
                j++;
            }
            
            //do - while loop

            let k=1;
            do{
                console.log("Do-while loop:",k); 
                k++;
            }
            while(k<=3);

            //continue break stmt

            for (let n=1;n<=10;n++){
                if(n===5){
                    continue;
                }
                if(n===8){
                    break;
                }
                console.log("Continue and break statement:",n);
             
            }

        </script>
    </body>
</html>
